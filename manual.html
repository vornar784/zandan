<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАНДАН - Ръководство</title>
    <link rel="stylesheet" href="style.css"> <style>
        .book-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; padding: 20px; }
        .page-image { max-width: 500px; width: 100%; border: 5px solid #333; box-shadow: 10px 10px 5px #ccc; }
        .page-text { flex: 1; min-width: 300px; max-width: 600px; padding: 20px; background: #f9f9f9; border-radius: 8px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .controls { text-align: center; margin: 20px 0; }
        button { padding: 10px 20px; cursor: pointer; background: #8b0000; color: white; border: none; border-radius: 5px; margin: 5px; }
        .lang-switch { margin-bottom: 10px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Начало</a>
        <a href="manual.html">Ръководство</a>
        <a href="bestiary.html">Бестиарий</a>
    </nav>

    <div class="controls">
        <div class="lang-switch">
            <button onclick="setLanguage('bg')">Български</button>
            <button onclick="setLanguage('en')">English</button>
        </div>
        <button onclick="prevPage()">⬅ Предишна</button>
        <span id="page-number">Страница 1 / 30</span>
        <button onclick="nextPage()">Следваща ➡</button>
    </div>

    <div class="book-container">
        <img id="current-page-img" src="images/1.jpg" alt="Страница от Зандан" class="page-image">
        <div id="current-page-content" class="page-text">
            </div>
    </div>

    <script>
       let currentPage = 1;
    let currentLang = 'bg';

    // Разширен масив - добавяме празни обекти за всички 30 страници
    const content = {
        1: { bg: "<h1>ЗАНДАН</h1><p>Оригинална корица. Автор: Валентин и Евгени.</p>", en: "<h1>ZANDAN</h1><p>Original Cover. Authors: Valentin & Evgeni.</p>" },
        2: { bg: "<h3>Увод</h3><p>Тъмнината беше разкъсана от две мъждукащи факли...</p>", en: "<h3>Intro</h3><p>The darkness was pierced by two flickering torches...</p>" },
        3: { bg: "<h3>Началото</h3><p>Гилбърт и Макс пред напуканата стена...</p>", en: "<h3>The Beginning</h3><p>Gilbert and Max before the cracked wall...</p>" }
        // Добави текстовете за останалите страници тук
    };

    function updateUI() {
        // Смяна на изображението - това трябва да работи винаги, ако файловете са в /images/
        const imgElement = document.getElementById('current-page-img');
        imgElement.src = `images/${currentPage}.jpg`;

        // Смяна на номера
        document.getElementById('page-number').innerText = `Страница ${currentPage} / 30`;

        // Проверка дали има текст за тази страница
        const pageText = content[currentPage];
        const displayDiv = document.getElementById('current-page-content');
        
        if (pageText) {
            displayDiv.innerHTML = pageText[currentLang];
        } else {
            displayDiv.innerHTML = currentLang === 'bg' ? 
                `<p><i>(Оригинален ръкопис на страница ${currentPage}. Текстът е в процес на обработка.)</i></p>` : 
                `<p><i>(Original manuscript of page ${currentPage}. Text processing in progress.)</i></p>`;
        }
    }

    function nextPage() {
        if(currentPage < 30) {
            currentPage++;
            updateUI();
        }
    }

    function prevPage() {
        if(currentPage > 1) {
            currentPage--;
            updateUI();
        }
    }

    function setLanguage(lang) {
        currentLang = lang;
        updateUI();
    }

    // Инициализация при зареждане
    window.onload = updateUI;
    </script>
</body>
</html>
