<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зандан - Ръководство</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap');

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Навигация */
        nav {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding: 15px;
            border-bottom: 1px solid #333;
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 2px;
            transition: color 0.3s;
        }
        nav a:hover { color: #d4af37; }

        /* Контроли */
        .controls {
            margin-bottom: 30px;
            text-align: center;
            z-index: 10;
        }

        .btn {
            background-color: #1a1a1a;
            color: white;
            border: 1px solid #ffffff;
            padding: 10px 25px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8em;
            margin: 5px;
            transition: all 0.3s;
            border-radius: 4px;
        }
        .btn:hover:not(:disabled) {
            background-color: #ffffff;
            color: #000000;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        .btn:disabled {
            border-color: #222;
            color: #444;
            cursor: not-allowed;
        }

        #page-info {
            margin: 0 15px;
            font-weight: bold;
            font-family: 'Architects Daughter', cursive;
            font-size: 1.2em;
            color: #d4af37;
        }

        /* Контейнер за книгата с ефект на разлистване */
        .book-viewport {
            max-width: 800px;
            width: 100%;
            perspective: 1000px;
            margin-bottom: 50px;
        }

        .manual-container {
            background: #0a0a0a;
            border: 1px solid #333;
            padding: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,1);
            position: relative;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.5s ease-in-out, opacity 0.5s;
        }

        /* Анимация при смяна на страница */
        .page-flip {
            animation: flipEffect 0.6s ease-in-out;
        }

        @keyframes flipEffect {
            0% { transform: translateX(0) rotateY(0); opacity: 1; }
            45% { transform: translateX(-20px) rotateY(-10deg); opacity: 0.7; }
            55% { transform: translateX(20px) rotateY(10deg); opacity: 0.7; }
            100% { transform: translateX(0) rotateY(0); opacity: 1; }
        }

        #manual-img {
            max-width: 100%;
            height: auto;
            border: 1px solid #222;
            display: block;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }

        .description {
            margin-top: 25px;
            font-style: italic;
            color: #888;
            text-align: center;
            font-family: 'Architects Daughter', cursive;
            max-width: 80%;
        }

        /* Номерация долу */
        .page-counter {
            margin-top: 10px;
            font-size: 0.8em;
            color: #444;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Начало</a>
        <a href="manual.html">Ръководство</a>
        <a href="bestiary.html">Бестиарий</a>
    </nav>

    <div class="controls">
        <button class="btn" id="prevBtn" onclick="changePage(-1)">← Назад</button>
        <span id="page-info">1 / 30</span>
        <button class="btn" id="nextBtn" onclick="changePage(1)">Напред →</button>
    </div>

    <div class="book-viewport">
        <div class="manual-container" id="book-page">
            <img id="manual-img" src="1.jpg" alt="Зандан - Страница">
            <div id="page-desc" class="description">Заглавна корица на играта.</div>
            <div class="page-counter" id="footer-count">стр. 1</div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        const totalPages = 30; // 1-28 + 29 (Числа) + 30 (Задна корица)

        const descriptions = {
            1: "Оригинална предна корица.",
            29: "Таблица за случайни числа (използва се вместо зарчета).",
            30: "Задна корица на ръководството."
        };

        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage < 1 || newPage > totalPages) return;

            const container = document.getElementById('book-page');
            
            // Стартиране на анимацията
            container.classList.remove('page-flip');
            void container.offsetWidth; // Трикваме рестарт на анимацията
            container.classList.add('page-flip');

            currentPage = newPage;

            // Изчакване на средата на анимацията за смяна на изображението
            setTimeout(() => {
                updateUI();
            }, 300);
        }

        function updateUI() {
            const img = document.getElementById('manual-img');
            const info = document.getElementById('page-info');
            const desc = document.getElementById('page-desc');
            const footer = document.getElementById('footer-count');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            img.src = currentPage + ".jpg";
            info.innerText = `${currentPage} / ${totalPages}`;
            footer.innerText = `стр. ${currentPage}`;
            
            desc.innerText = descriptions[currentPage] || `Страница ${currentPage} от архива на Зандан.`;

            prevBtn.disabled = (currentPage === 1);
            nextBtn.disabled = (currentPage === totalPages);
        }

        // Клавиатура
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowLeft") changePage(-1);
            if (e.key === "ArrowRight") changePage(1);
        });

        // Свайп за мобилни устройства
        let touchstartX = 0;
        let touchendX = 0;
        
        document.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX);
        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            if (touchstartX - touchendX > 50) changePage(1);
            if (touchendX - touchstartX > 50) changePage(-1);
        });
    </script>

</body>
</html>
