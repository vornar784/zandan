<!DOCTYPE html>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap');

        body { background-color: #0c0c0c; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        
        /* Заглавие в стила на началната страница */
        h1 { 
            text-align: center; 
            color: #d4af37; 
            font-family: 'Architects Daughter', cursive;
            font-size: 3em;
            text-transform: uppercase; 
            letter-spacing: 5px; 
            margin-bottom: 40px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        /* Бяла линия и бяло за заглавията на клетките */
        .cell-container { margin-bottom: 50px; border-left: 4px solid #ffffff; padding-left: 20px; }
        .cell-title { color: #ffffff; font-size: 1.8em; text-transform: uppercase; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }

        .monster-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
        }

        .monster-card { 
            background: #1a1a1a; 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }
        .monster-card:hover { transform: translateY(-5px); }

        .monster-img { width: 100%; height: auto; display: block; border-bottom: 2px solid #333; background: #1a1a1a; }
        .monster-img:not([src]) { display: none; } 

        .monster-info { padding: 15px; flex-grow: 1; }
        
        /* Имената на съществата вече са бели */
        .monster-name { display: block; font-size: 1.3em; color: #ffffff; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }

        /* Статистики с добавен К (Късмет) */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-box { background: #262626; padding: 5px 10px; border-radius: 4px; font-size: 0.85em; border: 1px solid #333; }
        .stat-label { color: #888; margin-right: 5px; font-weight: bold; }

        .special-note { color: #ff4444; font-size: 0.85em; margin-top: 10px; font-style: italic; border-top: 1px dashed #444; padding-top: 5px; }
    </style>
</head>
