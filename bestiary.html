<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Зандан - Бестиарий</title>
    <style>
        body { background-color: #0c0c0c; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #ff0000; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 40px; }
        
        /* Стил за Клетките */
        .cell-container { margin-bottom: 50px; border-left: 4px solid #ff0000; padding-left: 20px; }
        .cell-title { color: #ffcc00; font-size: 1.8em; text-transform: uppercase; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }

        .monster-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
        }

        .monster-card { 
            background: #1a1a1a; 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }
        .monster-card:hover { transform: translateY(-5px); }

        .monster-img { width: 100%; height: auto; display: block; border-bottom: 2px solid #333; }

        .monster-info { padding: 15px; flex-grow: 1; }
        .monster-name { display: block; font-size: 1.3em; color: #ffcc00; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-box { background: #262626; padding: 5px 10px; border-radius: 4px; font-size: 0.9em; border: 1px solid #333; }
        .stat-label { color: #888; margin-right: 5px; font-weight: bold; }

        .special-note { color: #ff4444; font-size: 0.85em; margin-top: 10px; font-style: italic; }
        .page-tag { font-size: 0.7em; color: #555; margin-top: 10px; display: block; text-align: right; }
    </style>
</head>
