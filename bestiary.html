<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАНДАН - Бестиарий</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Segoe UI', serif; background-color: #1a1a1a; color: #e0e0e0; margin: 0; }
        nav { background: #333; padding: 15px; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        
        .container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        h1 { text-align: center; color: #cc0000; text-transform: uppercase; letter-spacing: 2px; }

        .monster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .monster-card { background: #2a2a2a; border: 1px solid #444; border-radius: 10px; overflow: hidden; transition: transform 0.3s; cursor: pointer; }
        .monster-card:hover { transform: scale(1.03); border-color: #cc0000; }
        
        .monster-img { width: 100%; height: 200px; object-fit: cover; border-bottom: 1px solid #444; background: #000; }
        .monster-info { padding: 15px; }
        .monster-name { font-size: 1.4em; color: #ffcc00; margin-bottom: 10px; display: block; }
        
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.9em; }
        .stat-box { background: #333; padding: 5px 10px; border-radius: 4px; }
        .stat-label { color: #888; margin-right: 5px; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Начало</a>
    <a href="manual.html">Ръководство</a>
    <a href="bestiary.html">Бестиарий</a>
</nav>

<div class="container">
    <h1>Зверилник</h1>
    <div class="monster-grid" id="monster-grid">
        </div>
</div>

<script>
    // 1. Списък със страниците от Бестиария (18-28)
    const diaryPages = [];
    for (let i = 18; i <= 28; i++) {
        diaryPages.push(`pages/${i}.jpg`);
    }

    // 2. Списък със съществата
    const monsters = [
        { name: "Плъх", page: 20, u: 1, z: 5, j: 5, op: 1 },
        { name: "Гигантски плъх", page: 20, u: 2, z: 8, j: 15, op: 3 },
        { name: "Мукалец", page: 21, img: "pages/Mukalets.jpg", u: 5, z: 12, j: 45, op: 15 },
        { name: "Джудже Ренегат", page: 22, img: "pages/DjudjeRenegat.jpg", u: 5, z: 15, j: 50, op: 20 },
        { name: "Скелет", page: 23, u: 3, z: 10, j: 25, op: 6 },
        { name: "Зомби", page: 23, u: 2, z: 7, j: 35, op: 8 },
        { name: "Окото", page: 24, u: 8, z: 15, j: 120, op: 70 },
        { name: "Орк", page: 25, img: "pages/Orc.jpg", u: 4, z: 12, j: 40, op: 12 },
        { name: "Гоблин", page: 25, u: 3, z: 11, j: 20, op: 10 },
        { name: "Огромен Паяк", page: 26, u: 6, z: 13, j: 70, op: 45 },
        { name: "Трол", page: 26, img: "pages/Troll.jpg", u: 6, z: 14, j: 80, op: 30 },
        { name: "Минотавър", page: 27, u: 7, z: 15, j: 100, op: 50 },
        { name: "Призрак", page: 27, u: 5, z: 18, j: 60, op: 60 },
        { name: "Дракон", page: 28, img: "pages/Drakon.jpg", u: 12, z: 20, j: 300, op: 500 }
    ];

    // Функция за визуализация
    function renderBestiary() {
        const container = document.getElementById('monster-grid');
        container.innerHTML = '<h2>Галерия на чудовищата</h2>'; // Заглавие над мрежата
        
        monsters.forEach(m => {
            const card = document.createElement('div');
            card.className = 'monster-card';
            
            // Използваме индивидуалната рисунка, ако я има, иначе показваме икона
            const imageHtml = m.img 
                ? `<img src="${m.img}" class="monster-img" alt="${m.name}">`
                : `<div class="monster-img" style="background:#111; display:flex; align-items:center; justify-content:center; color:#444;">стр. ${m.page}</div>`;

            card.innerHTML = `
                ${imageHtml}
                <div class="monster-info">
                    <strong class="monster-name">${m.name}</strong>
                    <div class="stats">
                        <div class="stat-box"><span class="stat-label">У:</span>${m.u}</div>
                        <div class="stat-box"><span class="stat-label">З:</span>${m.z}</div>
                        <div class="stat-box"><span class="stat-label">Ж:</span>${m.j}</div>
                        <div class="stat-box"><span class="stat-label">ОП:</span>${m.op}</div>
                    </div>
                    <small style="color:#666">Виж в ръкописа: стр. ${m.page}</small>
                </div>
            `;
            container.appendChild(card);
        });

        // Добавяме секция за преглед на оригиналните страници (18-28)
        const pagesSection = document.createElement('div');
        pagesSection.innerHTML = '<h2 style="margin-top:50px;">Оригинални страници (18-28)</h2>';
        pagesSection.style.width = "100%";
        
        const scrollBox = document.createElement('div');
        scrollBox.style.display = "flex";
        scrollBox.style.overflowX = "scroll";
        scrollBox.style.gap = "15px";
        scrollBox.style.padding = "20px 0";

        diaryPages.forEach(p => {
            const img = document.createElement('img');
            img.src = p;
            img.style.height = "300px";
            img.style.border = "2px solid #444";
            scrollBox.appendChild(img);
        });

        pagesSection.appendChild(scrollBox);
        container.after(pagesSection);
    }

    renderBestiary();
</script>

</body>
</html>
