<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАНДАН - Бестиарий</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Segoe UI', serif; background-color: #1a1a1a; color: #e0e0e0; margin: 0; }
        nav { background: #333; padding: 15px; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        
        .container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        h1 { text-align: center; color: #cc0000; text-transform: uppercase; letter-spacing: 2px; }

        .monster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .monster-card { background: #2a2a2a; border: 1px solid #444; border-radius: 10px; overflow: hidden; transition: transform 0.3s; cursor: pointer; }
        .monster-card:hover { transform: scale(1.03); border-color: #cc0000; }
        
        .monster-img { width: 100%; height: 200px; object-fit: cover; border-bottom: 1px solid #444; background: #000; }
        .monster-info { padding: 15px; }
        .monster-name { font-size: 1.4em; color: #ffcc00; margin-bottom: 10px; display: block; }
        
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.9em; }
        .stat-box { background: #333; padding: 5px 10px; border-radius: 4px; }
        .stat-label { color: #888; margin-right: 5px; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Начало</a>
    <a href="manual.html">Ръководство</a>
    <a href="bestiary.html">Бестиарий</a>
</nav>

<div class="container">
    <h1>Зверилник</h1>
    <div class="monster-grid" id="monster-grid">
        </div>
</div>

<script>
    const monsters = [
        // ХОРА (Клетка 1)
        { name: "Селянин", page: 18, u: 2, z: 7, j: 12, op: 31 },
        { name: "Бандит", page: 18, u: 6, z: 10, j: 15, op: 41 },
        { name: "Вещица", page: 18, u: 4, z: 10, j: 12, op: 47 },
        { name: "Главатар", page: 18, u: 8, z: 12, j: 20, op: 48 },
        { name: "Елитен легионер", page: 19, u: 11, z: 11, j: 28, op: 55 },
        { name: "Наемен убиец", page: 19, u: 10, z: 11, j: 20, op: 55 },
        { name: "Рицар", page: 19, u: 11, z: 14, j: 28, op: 61 },
        { name: "Черен Паладин", page: 19, img: "pages/CherenPaladin.png", u: 10, z: 14, j: 30, op: 68 },

        // ЖИВОТНИ (Клетка 2)
        { name: "Куче", page: 20, u: 4, z: 10, j: 10, op: 38 },
        { name: "Вълк", page: 20, u: 6, z: 15, j: 12, op: 47 },
        { name: "Кафява мечка", page: 20, u: 9, z: 10, j: 20, op: 48 },
        { name: "Мечка на Брейг", page: 20, u: 11, z: 8, j: 23, op: 48 },
        { name: "Макрид", page: 20, img: "pages/Makrid.jpg", u: 10, z: 10, j: 20, op: 54 },
        { name: "Боа", page: 20, u: 6, z: 7, j: 17, op: 38 },
        { name: "Кобра", page: 21, u: 7, z: 14, j: 2, op: 44, spec: "+5 отрова" },
        { name: "Лъв", page: 21, u: 11, z: 12, j: 17, op: 52 },

        // ФАНТАСТИЧНИ (Клетка 3 - част)
        { name: "Гнол", page: 22, u: 2, z: 8, j: 9, op: 19 },
        { name: "Таласъм", page: 22, u: 1, z: 10, j: 5, op: 23 },
        { name: "Ими", page: 22, u: 1, z: 7, j: 3, op: 23 },
        { name: "Скелет", page: 22, u: 2, z: 7, j: 8, op: 24 },
        { name: "Гоблин", page: 22, u: 1, z: 8, j: 5, op: 20 },
        { name: "Зомби", page: 22, u: 4, z: 4, j: 10, op: 27 },
        { name: "Дракон", img: "pages/Drakon.jpg", u: 12, z: 20, j: 300, op: 500 },
        { name: "Токен", img: "pages/Token.png", u: 7, z: 14, j: 65, op: 40 }
    ];

    const grid = document.getElementById('monster-grid');
    monsters.forEach(m => {
        const card = document.createElement('div');
        card.className = 'monster-card';
        const imageHtml = m.img 
            ? `<img src="${m.img}" class="monster-img" alt="${m.name}" onerror="this.src='pages/placeholder.jpg'">`
            : `<div class="monster-img" style="background:#111; display:flex; align-items:center; justify-content:center; color:#333; height:200px;">стр. ${m.page}</div>`;

        card.innerHTML = `
            ${imageHtml}
            <div class="monster-info">
                <strong class="monster-name">${m.name}</strong>
                <div class="stats">
                    <div class="stat-box"><span class="stat-label">У:</span>${m.u}</div>
                    <div class="stat-box"><span class="stat-label">З:</span>${m.z}</div>
                    <div class="stat-box"><span class="stat-label">Ж:</span>${m.j}</div>
                    <div class="stat-box"><span class="stat-label">ОП:</span>${m.op}</div>
                </div>
                ${m.spec ? `<div style="color:red; font-size:0.8em; margin-top:5px;">${m.spec}</div>` : ''}
            </div>
        `;
        grid.appendChild(card);
    });
</script>

</body>
</html>
