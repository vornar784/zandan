<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>ЗАНДАН</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0a; color: #eee; font-family: 'Courier New', serif; overflow: hidden; }
        
        /* Стил за интрото */
        #intro { position: fixed; width: 100%; height: 100%; z-index: 1000; display: flex; justify-content: center; align-items: center; background: black; cursor: pointer; }
        #intro img { max-width: 100%; max-height: 100%; transition: all 3s ease; filter: grayscale(1) contrast(1.2); }
        #intro.zoom img { transform: scale(2); opacity: 0; }

        /* Стил за логото (твоята рисунка) */
        #logo-fade { position: fixed; width: 100%; height: 100%; z-index: 900; display: none; justify-content: center; align-items: center; background: black; opacity: 0; transition: opacity 2s; }
        #logo-fade img { 
            max-width: 80%; 
            filter: invert(1) grayscale(1) contrast(1.5); /* Това ще направи белия лист черен, а черния молив - бял! */
            mix-blend-mode: screen;
        }

        #main-content { padding: 50px; display: none; text-align: center; animation: fadeIn 3s; }
        nav { border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        nav a { color: #888; text-decoration: none; margin: 0 15px; text-transform: uppercase; letter-spacing: 2px; }
        nav a:hover { color: #fff; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="intro" onclick="startIntro()">
        <img src="intro.jpg" onerror="this.src='https://images.unsplash.com/photo-1519074069444-1ba4fff66d16?auto=format&fit=crop&w=1000&q=80'">
        <div style="position:absolute; bottom:15%; letter-spacing:5px; font-size:14px; color:white;">КЛИКНИ, ЗА ДА ПРИСТЪПИШ</div>
    </div>

    <div id="logo-fade">
        <img src="logo.png">
    </div>

    <div id="main-content">
        <nav>
            <a href="#">Начало</a>
            <a href="#">Правила</a>
            <a href="#">Бестиарий</a>
            <a href="#">Галерия</a>
        </nav>
        <h1 style="font-size: 4em; letter-spacing: 10px;">ЗАНДАН</h1>
        <p style="color: #666;">Дигитален архив на една легенда</p>
    </div>

    <script>
        function startIntro() {
            const intro = document.getElementById('intro');
            const logoFade = document.getElementById('logo-fade');
            const mainContent = document.getElementById('main-content');

            intro.classList.add('zoom');

            setTimeout(() => {
                intro.style.display = 'none';
                logoFade.style.display = 'flex';
                setTimeout(() => { logoFade.style.opacity = 1; }, 100);
            }, 2500);

            setTimeout(() => {
                logoFade.style.opacity = 0;
                setTimeout(() => {
                    logoFade.style.display = 'none';
                    mainContent.style.display = 'block';
                    document.body.style.overflow = 'auto';
                }, 2000);
            }, 6000);
        }
    </script>
</body>
</html>
