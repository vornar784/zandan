<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>ЗАНДАН - Начало</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; color: white; font-family: 'Courier New', serif; overflow: hidden; }
        #viewport { position: fixed; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }

        #dungeon-entry {
            position: absolute; width: 100%; height: 100%;
            background: url('images/intro.jpg') no-repeat center center;
            background-size: cover;
            animation: walkIntoDungeon 6s forwards;
            filter: grayscale(1) contrast(1.2);
        }

        #logo-container {
            position: absolute; opacity: 0;
            animation: showLogo 4s 5s forwards;
            text-align: center;
        }
        #logo-container img { 
            max-width: 300px; 
            filter: invert(1) grayscale(1) contrast(1.5);
            mix-blend-mode: screen;
        }

        #main-site { display: none; padding: 50px; text-align: center; animation: fadeIn 2s; }
        nav { border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        nav a { color: #888; text-decoration: none; margin: 0 15px; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9em; }

        @keyframes walkIntoDungeon {
            0% { transform: scale(1); opacity: 0; }
            10% { opacity: 1; }
            80% { transform: scale(1.8); opacity: 1; filter: grayscale(1) blur(0px); }
            100% { transform: scale(2.5); opacity: 0; filter: blur(10px); }
        }

        @keyframes showLogo {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="intro-sequence">
        <div id="viewport">
            <div id="dungeon-entry"></div>
            <div id="logo-container">
                <img src="images/logo.png">
                <h2 style="letter-spacing: 15px; margin-top: 20px;">ЗАНДАН</h2>
            </div>
        </div>
    </div>

    <div id="main-site">
        <nav>
            <a href="#">Начало</a>
            <a href="#">Правила</a>
            <a href="#">Бестиарий</a>
            <a href="#">Галерия</a>
        </nav>
        <h1 style="font-size: 4em; letter-spacing: 10px; margin-top: 10vh;">ЗАНДАН</h1>
        <p style="color: #666; font-style: italic;">Дигитализиран архив на една легенда</p>
    </div>

    <script>
        setTimeout(() => {
            document.getElementById('intro-sequence').style.display = 'none';
            const main = document.getElementById('main-site');
            main.style.display = 'block';
            document.body.style.overflow = 'auto';
        }, 10000);
    </script>
</body>
</html>
