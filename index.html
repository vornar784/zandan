<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАНДАН - Начало</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Анимация на влизането */
        #dungeon-entry {
            position: absolute; 
            width: 100%; 
            height: 100%;
            background-image: url('intro.jpg'); /* Увери се, че името е точно така в GitHub */
            background-color: black;
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            filter: grayscale(1) contrast(1.2);
            opacity: 0;
            animation: walkIntoDungeon 8s ease-in-out forwards;
            z-index: 1;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            /* Градиент, който прелива към черно в краищата */
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.9) 100%);
        }

        /* Инвертиране на логото: от черно на бяло -> бяло на черно */
        #logo {
            max-width: 500px;
            width: 85%;
            filter: invert(1) drop-shadow(0 0 15px rgba(255,255,255,0.3));
            opacity: 0;
            transform: scale(0.95);
            animation: logoEmerge 4s ease-out 3s forwards;
            margin-bottom: 20px;
        }

        .subtitle {
            font-family: 'Architects Daughter', cursive;
            color: #aaa;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 1.1em;
            opacity: 0;
            animation: fadeIn 2s ease-out 5s forwards;
            margin-bottom: 30px;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 260px;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 6s forwards;
        }

        .btn {
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            text-decoration: none;
            padding: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8em;
            transition: all 0.4s ease;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* Специален цвят за Архива */
        .btn-gold {
            border-color: rgba(212, 175, 55, 0.5);
            color: #d4af37;
        }

        .btn-gold:hover {
            background: #d4af37;
            color: #000;
        }

        /* АНИМАЦИИ */
        @keyframes walkIntoDungeon {
            0% { opacity: 0; transform: scale(1); filter: grayscale(1) blur(5px); }
            25% { opacity: 1; filter: grayscale(0.6) blur(0px); }
            100% { opacity: 0.5; transform: scale(1.1); filter: grayscale(0.3) contrast(1.3); }
        }

        @keyframes logoEmerge {
            0% { opacity: 0; filter: invert(1) brightness(0); }
            100% { opacity: 1; filter: invert(1) brightness(1.2); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="dungeon-entry"></div>

    <div class="ui-layer">
        <img src="logo.png" id="logo" alt="ЗАНДАН Лого">
        
        <div class="subtitle">Приключенска настолна игра</div>

        <div class="menu">
            <a href="manual.html" class="btn">Ръководство</a>
            <a href="hero.html" class="btn">Герой</a>
            <a href="bestiary.html" class="btn">Бестиарий</a>
            <a href="archive.html" class="btn btn-gold">Архив (Оригинали)</a>
        </div>
    </div>

</body>
</html>
