<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАНДАН - Начало</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* ЕФЕКТЪТ НА ВЛИЗАНЕ */
        #dungeon-entry {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* ПЪТЯТ Е КОРЕГИРАН КЪМ ПАПКА IMAGES */
            background-image: url('images/intro.jpg'); 
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            z-index: 1;
            
            opacity: 0;
            transform: scale(1);
            filter: grayscale(0.5) blur(10px);
            
            /* Анимация за влизане */
            animation: walkIntoDungeon 10s ease-out forwards;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 20%, rgba(0,0,0,0.8) 100%);
            z-index: 2;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        #logo {
            max-width: 500px;
            width: 80%;
            /* ПЪТЯТ Е КОРЕГИРАН КЪМ ПАПКА IMAGES */
            /* filter: invert(1) превръща черните линии в бели */
            filter: invert(1) drop-shadow(0 0 20px rgba(255,255,255,0.4));
            opacity: 0;
            transform: translateY(20px);
            animation: logoFadeIn 3s ease-out 4s forwards;
            margin-bottom: 10px;
        }

        .subtitle {
            font-family: 'Architects Daughter', cursive;
            color: #ccc;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 1.1em;
            opacity: 0;
            animation: genericFadeIn 2s ease-out 6s forwards;
            margin-bottom: 40px;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 260px;
            opacity: 0;
            animation: genericFadeIn 1.5s ease-out 7s forwards;
        }

        .btn {
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            text-decoration: none;
            padding: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8em;
            transition: all 0.4s ease;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .btn-gold {
            border-color: rgba(212, 175, 55, 0.6);
            color: #d4af37;
        }

        .btn-gold:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        @keyframes walkIntoDungeon {
            0% { opacity: 0; transform: scale(1); filter: grayscale(0.8) blur(10px); }
            20% { opacity: 1; filter: grayscale(0.5) blur(5px); }
            100% { opacity: 0.7; transform: scale(1.2); filter: grayscale(0.2) blur(0px); }
        }

        @keyframes logoFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes genericFadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="dungeon-entry"></div>
    <div class="overlay"></div>

    <div class="ui-layer">
        <img src="images/logo.png" id="logo" alt="ЗАНДАН">
        
        <div class="subtitle">Приключенска настолна игра</div>

        <div class="menu">
            <a href="manual.html" class="btn">Ръководство</a>
            <a href="hero.html" class="btn">Герой</a>
            <a href="bestiary.html" class="btn">Бестиарий</a>
            <a href="archive.html" class="btn btn-gold">Архив (Оригинали)</a>
        </div>
    </div>

</body>
</html>
