<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАНДАН - Начало</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* ИНТРО КАРТИНКА */
        #dungeon-intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/intro.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            z-index: 5;
            animation: immersion 6s ease-in forwards;
        }

        /* ИНТЕРФЕЙС */
        .ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            opacity: 0;
            animation: showInterface 2s ease-out 6.5s forwards;
        }

        #logo {
            max-width: 500px;
            width: 85%;
            /* ПРЕМАХНАТО ХАЛО: Оставихме само инвертирането на цветовете */
            filter: invert(1); 
            margin-bottom: 20px;
        }

        .subtitle {
            font-family: 'Architects Daughter', cursive;
            color: #aaa;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 1.1em;
            margin-bottom: 35px;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 260px;
        }

        .btn {
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            text-decoration: none;
            padding: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85em;
            transition: all 0.4s ease;
            background: rgba(255, 255, 255, 0.05);
        }

        .btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .btn-gold {
            border-color: #d4af37;
            color: #d4af37;
        }

        .btn-gold:hover {
            background: #d4af37;
            color: #000;
        }

        @keyframes immersion {
            0% { transform: scale(1); opacity: 1; filter: brightness(1); }
            80% { transform: scale(1.2); opacity: 1; filter: brightness(0.8); }
            100% { transform: scale(1.3); opacity: 0; filter: brightness(0); }
        }

        @keyframes showInterface {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="dungeon-intro"></div>

    <div class="ui-layer">
        <img src="images/logo.png" id="logo" alt="ЗАНДАН">
        
        <div class="subtitle">Приключенска настолна игра</div>

        <div class="menu">
            <a href="manual.html" class="btn">Ръководство</a>
            <a href="hero.html" class="btn">Герой</a>
            <a href="bestiary.html" class="btn">Бестиарий</a>
            <a href="archive.html" class="btn btn-gold">Архив (Оригинали)</a>
        </div>
    </div>

</body>
</html>
