<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>ЗАНДАН - Начало</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; color: white; font-family: 'Courier New', serif; overflow: hidden; }
        #viewport { position: fixed; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: black; }

        /* ВРАТАТА */
       #dungeon-entry {
    position: absolute; 
    width: 100%; 
    height: 100%;
    /* Пробваме всички възможни пътища едновременно */
    background-image: url('images/intro.jpg');
    background-color: black; /* Ако няма картинка, поне да е черно */
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;
    animation: walkIntoDungeon 6s forwards;
    filter: grayscale(1) contrast(1.2);
    opacity: 0;
}
        /* ЛОГОТО (ДРАКОНА) */
        #logo-container {
            position: absolute; opacity: 0;
            animation: showLogo 4s 5s forwards;
            text-align: center;
            z-index: 10;
        }
        #logo-container img { 
            max-width: 300px; 
            /* Ефектът, който прави белия лист прозрачен и черния молив - бял */
            filter: invert(1) grayscale(1) contrast(1.5);
            mix-blend-mode: screen;
        }

        #main-site { display: none; padding: 50px; text-align: center; animation: fadeIn 2s; }
        nav { border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        nav a { color: #888; text-decoration: none; margin: 0 15px; text-transform: uppercase; letter-spacing: 2px; }

        #skip-btn { position: fixed; bottom: 20px; right: 20px; font-size: 10px; color: #444; cursor: pointer; z-index: 100; border: 1px solid #222; padding: 5px; }

        @keyframes walkIntoDungeon {
            0% { transform: scale(1); opacity: 0; }
            15% { opacity: 1; }
            85% { transform: scale(2); opacity: 1; filter: blur(0px); }
            100% { transform: scale(2.8); opacity: 0; filter: blur(15px); }
        }
        @keyframes showLogo {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="intro-sequence">
        <div id="viewport">
            <div id="dungeon-entry"></div>
            <div id="logo-container">
                <img src="images/logo.png" onerror="this.src='logo.png'">
                <h2 style="letter-spacing: 15px; margin-top: 20px;">ЗАНДАН</h2>
            </div>
        </div>
        <div id="skip-btn" onclick="enterSite()">SKIP INTRO</div>
    </div>

    <div id="main-site">
        <nav>
    <a href="index.html">Начало</a>
    <a href="manual.html">Ръководство</a>
    <a href="bestiary.html">Бестиарий</a>
    <a href="hero.html">Герой</a>
</nav>
        <h1 style="font-size: 4em; letter-spacing: 10px; margin-top: 10vh;">ЗАНДАН</h1>
        <p style="color: #666; font-style: italic;">Дигитализиран архив на една легенда</p>
    </div>

    <script>
        function enterSite() {
            document.getElementById('intro-sequence').style.display = 'none';
            const main = document.getElementById('main-site');
            main.style.display = 'block';
            document.body.style.overflow = 'auto';
        }

        // Автоматично влизане след 10 секунди
        setTimeout(enterSite, 10000);
    </script>
</body>
</html>
