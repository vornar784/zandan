<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зандан - Начало</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap');

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            font-family: 'Architects Daughter', cursive;
            font-size: 4em;
            margin-bottom: 10px;
            letter-spacing: 8px;
            color: #ffffff;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 1.2em;
            color: #888;
            margin-bottom: 50px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 300px;
        }

        .menu-btn {
            background: transparent;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 15px 30px;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .menu-btn:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        /* Специален акцент за Архива */
        .btn-archive {
            border-color: #d4af37;
            color: #d4af37;
        }
        .btn-archive:hover {
            background: #d4af37;
            border-color: #d4af37;
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8em;
            color: #444;
        }
    </style>
</head>
<body>

    <h1>ЗАНДАН</h1>
    <div class="subtitle">Приключенска настолна игра</div>

    <div class="menu-container">
        <a href="manual.html" class="menu-btn">Ръководство (Текст)</a>
        <a href="bestiary.html" class="menu-btn">Бестиарий</a>
        <a href="archive.html" class="menu-btn btn-archive">Архив (Оригинални страници)</a>
    </div>

    <footer>
        &copy; 2026 Проект Зандан. Всички права запазени.
    </footer>

</body>
</html>
