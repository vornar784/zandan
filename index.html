<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАНДАН - Начало</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap');

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            /* Лека анимация на фона за дълбочина */
            background: radial-gradient(circle at center, #111 0%, #000 70%);
        }

        /* Контейнер за анимацията на логото */
        .intro-container {
            opacity: 0;
            transform: scale(0.8);
            animation: emerge 2.5s ease-out forwards;
        }

        h1 {
            font-family: 'Architects Daughter', cursive;
            font-size: clamp(3.5em, 12vw, 6em);
            margin: 0;
            letter-spacing: 15px;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .subtitle {
            color: #888;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 50px;
            font-size: 1em;
            opacity: 0;
            animation: fadeIn 2s ease-out 1.5s forwards;
        }

        /* Меню с бутони */
        .menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 280px;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 2.5s forwards;
        }

        .btn {
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #fff;
            text-decoration: none;
            padding: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85em;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            border-color: #fff;
            transform: translateY(-2px);
        }

        /* Златен бутон за Архива */
        .btn-gold {
            border-color: rgba(212, 175, 55, 0.5);
            color: #d4af37;
        }

        .btn-gold:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            border-color: #d4af37;
        }

        /* Дефиниране на анимациите */
        @keyframes emerge {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Частици или прах (опционално за атмосфера) */
        .dust {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: transparent;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="intro-container">
        <h1>ЗАНДАН</h1>
    </div>
    
    <div class="subtitle">Приключенска настолна игра</div>

    <div class="menu">
        <a href="manual.html" class="btn">Ръководство</a>
        <a href="bestiary.html" class="btn">Бестиарий</a>
        <a href="archive.html" class="btn btn-gold">Архив (Оригинали)</a>
    </div>

    <div class="dust"></div>

    <script>
        // Можеш да добавиш лек ефект на следене на мишката тук по-късно
        console.log("Зандан се зарежда...");
    </script>

</body>
</html>
