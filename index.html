<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАНДАН - Начало</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Ефектът на влизане в подземието */
        #dungeon-entry {
            position: absolute; 
            width: 100%; 
            height: 100%;
            background-image: url('intro.jpg'); /* Промени на 'images/intro.jpg', ако е в папка */
            background-color: black;
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            filter: grayscale(1) contrast(1.2);
            opacity: 0;
            animation: walkIntoDungeon 8s ease-in-out forwards;
            z-index: 1;
        }

        /* Логото и менюто */
        .ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%);
        }

        #logo {
            max-width: 500px;
            width: 80%;
            opacity: 0;
            transform: scale(0.9);
            animation: logoEmerge 4s ease-out 3s forwards;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
            margin-bottom: 20px;
        }

        .subtitle {
            font-family: 'Architects Daughter', cursive;
            color: #888;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 1.2em;
            opacity: 0;
            animation: fadeIn 2s ease-out 5s forwards;
            margin-bottom: 40px;
        }

        /* Менюто */
        .menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 280px;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 6s forwards;
        }

        .btn {
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            text-decoration: none;
            padding: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85em;
            transition: all 0.4s ease;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
            border-color: #fff;
            transform: translateY(-2px);
        }

        .btn-gold {
            border-color: rgba(212, 175, 55, 0.5);
            color: #d4af37;
        }

        .btn-gold:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
        }

        /* АНИМАЦИИ */
        @keyframes walkIntoDungeon {
            0% { opacity: 0; transform: scale(1); filter: grayscale(1) blur(10px); }
            20% { opacity: 1; filter: grayscale(0.5) blur(0px); }
            100% { opacity: 0.6; transform: scale(1.15); filter: grayscale(0.2) contrast(1.3); }
        }

        @keyframes logoEmerge {
            0% { opacity: 0; transform: scale(0.8); filter: brightness(0); }
            100% { opacity: 1; transform: scale(1); filter: brightness(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="dungeon-entry"></div>

    <div class="ui-layer">
        <img src="logo.png" id="logo" alt="ЗАНДАН Лого">
        
        <div class="subtitle">Приключенска настолна игра</div>

        <div class="menu">
            <a href="manual.html" class="btn">Ръководство</a>
            <a href="bestiary.html" class="btn">Бестиарий</a>
            <a href="archive.html" class="btn btn-gold">Архив (Оригинали)</a>
        </div>
    </div>

</body>
</html>
