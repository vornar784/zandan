<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАНДАН - Архив</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #fff; /* Точка 1: Заглавието е в бяло */
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .thumbnail {
            width: 100%;
            cursor: pointer;
            border: 1px solid #333;
            transition: transform 0.3s, border-color 0.3s;
        }

        .thumbnail:hover {
            transform: scale(1.05);
            border-color: #d4af37;
        }

        /* МОДАЛЕН ПРОЗОРЕЦ (Приближаване) */
        #viewer {
            display: none; /* Скрит по подразбиране */
            position: fixed;
            z-index: 100;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
        }

        #viewer-img {
            max-width: 85%;
            max-height: 85%;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border: 2px solid #444;
        }

        /* Бутони за навигация */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            font-size: 3em;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
            user-select: none;
        }

        .nav-btn:hover { background: rgba(255,255,255,0.2); }
        .nav-btn:disabled { opacity: 0; cursor: default; }

        #prev-btn { left: 2%; }
        #next-btn { right: 2%; }

        .close-area {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: #d4af37;
            text-decoration: none;
            border: 1px solid #d4af37;
            padding: 10px 20px;
        }
    </style>
</head>
<body>

    <h1>Оригинали</h1>

    <div class="gallery" id="gallery">
        <script>
            const gallery = document.getElementById('gallery');
            for (let i = 1; i <= 30; i++) {
                const img = document.createElement('img');
                img.src = `images/${i}.jpg`; // Провери дали файловете са точно .jpg или .png
                img.className = 'thumbnail';
                img.onclick = () => openViewer(i);
                gallery.appendChild(img);
            }
        </script>
    </div>

    <a href="index.html" class="back-link">← Назад към Начало</a>

    <div id="viewer">
        <div class="close-area" onclick="closeViewer()"></div>
        <button id="prev-btn" class="nav-btn" onclick="changeImage(-1)">&#10094;</button>
        <img id="viewer-img" src="" alt="Страница от Зандан">
        <button id="next-btn" class="nav-btn" onclick="changeImage(1)">&#10095;</button>
    </div>

    <script>
        let currentIdx = 1;
        const totalImages = 30;
        const viewer = document.getElementById('viewer');
        const viewerImg = document.getElementById('viewer-img');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        function openViewer(index) {
            currentIdx = index;
            updateViewer();
            viewer.style.display = 'flex';
        }

        function closeViewer() {
            viewer.style.display = 'none';
        }

        function changeImage(step) {
            let newIdx = currentIdx + step;
            if (newIdx >= 1 && newIdx <= totalImages) {
                currentIdx = newIdx;
                updateViewer();
            }
        }

        function updateViewer() {
            viewerImg.src = `images/${currentIdx}.jpg`;
            // Управление на видимостта на бутоните
            prevBtn.disabled = (currentIdx === 1);
            nextBtn.disabled = (currentIdx === totalImages);
        }

        // Клавиатура (Стрелки)
        window.addEventListener('keydown', (e) => {
            if (viewer.style.display === 'flex') {
                if (e.key === 'ArrowLeft') changeImage(-1);
                if (e.key === 'ArrowRight') changeImage(1);
                if (e.key === 'Escape') closeViewer();
            }
        });
    </script>

</body>
</html>
