<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>ЗАНДАН - Архив</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap');
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        nav { margin-bottom: 40px; padding: 20px; border-bottom: 1px solid #222; }
        nav a { color: #888; text-decoration: none; margin: 0 15px; text-transform: uppercase; font-size: 0.8em; letter-spacing: 2px; }
        nav a:hover, nav a.active { color: #d4af37; }

        h2 { font-family: 'Architects Daughter', cursive; color: #d4af37; font-size: 2.5em; }
        
        .download-section { margin: 40px 0; background: #0a0a0a; border: 1px dashed #d4af37; padding: 30px; display: inline-block; }
        .btn-pdf { background: #d4af37; color: #000; padding: 12px 25px; text-decoration: none; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-pdf:hover { background: #fff; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
        .item img { width: 100%; border: 1px solid #222; transition: 0.3s; }
        .item img:hover { border-color: #d4af37; transform: scale(1.05); }
        .item p { font-size: 0.8em; color: #555; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Начало</a>
        <a href="manual.html">Ръководство</a>
        <a href="bestiary.html">Бестиарий</a>
        <a href="archive.html" class="active">Архив</a>
    </nav>

    <h2>ОРИГИНАЛНИ СТРАНИЦИ</h2>
    
    <div class="download-section">
        <p>Пълно ръководство в един файл:</p>
        <a href="Zandan_Manual.pdf" download class="btn-pdf">Изтегли PDF (30 стр.)</a>
    </div>

    <div class="grid" id="archiveGrid"></div>

    <script>
        const grid = document.getElementById('archiveGrid');
        for(let i=1; i<=30; i++) {
            grid.innerHTML += `<div class="item"><img src="${i}.jpg" alt="стр ${i}"><p>стр. ${i}</p></div>`;
        }
    </script>
</body>
</html>
