<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАНДАН - Архив</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap');

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* ГОРНО МЕНЮ */
        nav {
            background: rgba(20, 20, 20, 0.9);
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 50;
            border-bottom: 1px solid #333;
        }

        nav a {
            color: #aaa;
            text-decoration: none;
            margin: 0 15px;
            text-transform: uppercase;
            font-size: 0.8em;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        nav a:hover, nav a.active {
            color: #d4af37;
        }

        .container { padding: 40px 20px; }

        h1 {
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
        }

        /* СЕКЦИЯ PDF */
        .pdf-download {
            background: rgba(212, 175, 55, 0.1);
            border: 1px dashed #d4af37;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto 40px;
        }

        .pdf-btn {
            display: inline-block;
            background: #d4af37;
            color: #000;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }

        .pdf-btn:hover { background: #fff; }

        /* ГАЛЕРИЯ */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 1 / 1.4;
            object-fit: cover;
            cursor: pointer;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .thumbnail:hover {
            border-color: #d4af37;
            transform: translateY(-5px);
        }

        /* VIEWER */
        #viewer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #viewer-img {
            max-width: 90%;
            max-height: 90%;
            border: 1px solid #444;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            color: #fff;
            border: none;
            font-size: 4em;
            cursor: pointer;
            padding: 20px;
            opacity: 0.5;
        }

        .nav-btn:hover { opacity: 1; color: #d4af37; }
        #prev-btn { left: 10px; }
        #next-btn { right: 10px; }
        
        .close-overlay {
            position: absolute;
            width: 100%; height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Начало</a>
        <a href="hero.html">Герой</a>
        <a href="manual.html">Ръководство</a>
        <a href="bestiary.html">Бестиарий</a>
        <a href="archive.html" class="active">Архив</a>
    </nav>

    <div class="container">
        <h1>Оригинали</h1>

        <div class="pdf-download">
            <p>Пълно ръководство в един файл:</p>
            <a href="Zandan_Manual.pdf" class="pdf-btn" download>ИЗТЕГЛИ PDF (30 СТР.)</a>
        </div>

        <div class="gallery" id="gallery">
            </div>
    </div>

    <div id="viewer">
        <div class="close-overlay" onclick="closeViewer()"></div>
        <button id="prev-btn" class="nav-btn" onclick="changeImage(-1)">&#10094;</button>
        <img id="viewer-img" src="">
        <button id="next-btn" class="nav-btn" onclick="changeImage(1)">&#10095;</button>
    </div>

    <script>
        const gallery = document.getElementById('gallery');
        const viewer = document.getElementById('viewer');
        const viewerImg = document.getElementById('viewer-img');
        let currentIdx = 1;
        const totalImages = 30;

        // Генериране на малките картинки (от root)
        for (let i = 1; i <= totalImages; i++) {
            const img = document.createElement('img');
            img.src = `${i}.jpg`; // Картинките са в root
            img.className = 'thumbnail';
            img.onclick = () => openViewer(i);
            gallery.appendChild(img);
        }

        function openViewer(index) {
            currentIdx = index;
            updateViewer();
            viewer.style.display = 'flex';
        }

        function closeViewer() {
            viewer.style.display = 'none';
        }

        function updateViewer() {
            viewerImg.src = `${currentIdx}.jpg`;
            document.getElementById('prev-btn').style.visibility = (currentIdx === 1) ? 'hidden' : 'visible';
            document.getElementById('next-btn').style.visibility = (currentIdx === totalImages) ? 'hidden' : 'visible';
        }

        function changeImage(step) {
            currentIdx += step;
            if (currentIdx < 1) currentIdx = 1;
            if (currentIdx > totalImages) currentIdx = totalImages;
            updateViewer();
        }

        // Клавиатура
        window.addEventListener('keydown', (e) => {
            if (viewer.style.display === 'flex') {
                if (e.key === 'ArrowLeft') changeImage(-1);
                if (e.key === 'ArrowRight') changeImage(1);
                if (e.key === 'Escape') closeViewer();
            }
        });
    </script>
</body>
</html>
